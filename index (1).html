<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Subway Surfers">
    <meta name="theme-color" content="#111111">
    <meta name="description" content="Juego Subway Surfers 3D - Juega en línea gratuitamente desde cualquier dispositivo">
    <title>Subway Surfers Clone 3D - Single File</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        #game-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
        }

        .ui-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .hidden {
            display: none !important;
        }

        /* MENÚ DE INICIO */
        #start-menu {
            background: rgba(0, 0, 0, 0.4);
        }
        .game-title {
            color: #ffcc00;
            font-size: 3.5rem;
            text-align: center;
            text-shadow: 4px 4px 0px #ff3300, 8px 8px 0px #000;
            line-height: 0.9;
            margin-bottom: 2rem;
        }
        .game-title span { color: #fff; font-size: 2.5rem; }
        .pulse-text {
            color: #fff;
            font-size: 1.2rem;
            text-shadow: 2px 2px 4px #000;
            animation: pulse 1.5s infinite;
        }

        /* HUD */
        #hud {
            pointer-events: none;
            justify-content: flex-start;
            padding: 20px;
        }
        .hud-top {
            width: 100%;
            display: flex;
            justify-content: space-between;
            pointer-events: auto;
        }
        .score-container, .coin-container {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            border: 3px solid #fff;
            color: #fff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
        }
        .score-container { border-color: #ffcc00; }
        #multiplier-display {
            color: #ffcc00;
            margin-right: 10px;
            font-weight: bold;
        }

        /* BARRA DE ENERGÍA */
        .energy-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 20px;
            border-radius: 10px;
            border: 2px solid #00ff00;
            text-align: center;
            min-width: 220px;
        }
        .energy-label {
            color: #00ff00;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 6px;
            text-shadow: 0 0 10px #00ff00;
        }
        .energy-bar-background {
            width: 100%;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00ff00;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 5px;
        }
        .energy-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px #00ff00, inset 0 0 10px rgba(0, 255, 0, 0.5);
        }
        #energy-text {
            color: #00ff00;
            font-size: 0.85rem;
            font-weight: bold;
            text-shadow: 0 0 5px #00ff00;
        }

        /* CONTROLES MÓVILES */
        .mobile-controls {
            pointer-events: auto;
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        @media (min-width: 768px) {
            .mobile-controls { display: none; }
        }
        .row { display: flex; gap: 20px; }
        .ctrl-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid #fff;
            border-radius: 50%;
            color: #fff;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .ctrl-btn:active { background: rgba(255, 255, 255, 0.7); }

        /* GAME OVER */
        #game-over-menu {
            background: rgba(139, 0, 0, 0.85);
            color: #fff;
        }
        .game-over-title {
            font-size: 2.5rem;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 2rem;
            text-align: center;
        }
        .stats-box {
            background: rgba(0,0,0,0.5);
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            line-height: 1.8;
        }
        .high-score { color: #ffcc00; }
        #restart-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: inherit;
            background: #ffcc00;
            border: none;
            border-bottom: 5px solid #cc9900;
            border-radius: 10px;
            cursor: pointer;
        }
        #restart-btn:active { transform: translateY(3px); border-bottom-width: 2px; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <div id="ui-container">
        <div id="start-menu" class="ui-screen">
            <h1 class="game-title">SUBWAY<br><span>SURFERS</span></h1>
            <p class="pulse-text">TOCA O PRESIONA ESPACIO PARA JUGAR</p>
        </div>

        <div id="hud" class="ui-screen hidden">
            <div class="hud-top">
                <div class="score-container">
                    <div id="multiplier-display">x1</div>
                    <div id="score-display">000000</div>
                </div>
                <div class="coin-container">
                    <span class="coin-icon">🍚🍠🍌</span>
                    <span id="coin-display">0</span>
                </div>
            </div>
            
            <div class="energy-container">
                <div class="energy-label">ENERGÍA</div>
                <div class="energy-bar-background">
                    <div id="energy-bar" class="energy-bar-fill"></div>
                </div>
                <div id="energy-text">0/100</div>
            </div>
            
            <div class="mobile-controls">
                <button id="btn-up" class="ctrl-btn">▲</button>
                <div class="row">
                    <button id="btn-left" class="ctrl-btn">◀</button>
                    <button id="btn-down" class="ctrl-btn">▼</button>
                    <button id="btn-right" class="ctrl-btn">▶</button>
                </div>
            </div>
        </div>

        <div id="game-over-menu" class="ui-screen hidden">
            <h2 class="game-over-title">¡TE ATRAPÓ EL INSPECTOR!</h2>
            <div class="stats-box">
                <p>Puntaje: <span id="final-score">0</span></p>
                <p>Productos Cosechados: <span id="final-coins">0</span></p>
                <p class="high-score">Récord: <span id="high-score-display">0</span></p>
            </div>
            <button id="restart-btn">VOLVER A JUGAR</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // --- 1. CONFIGURACIÓN ---
        const GAME_CONFIG = {
            lanes: [-3.5, 0, 3.5], 
            laneSwitchSpeed: 15,    
            gravity: -45,
            jumpForce: 16,
            slideDuration: 0.7,     
            playerStartY: 0.5,
            initialSpeed: 25,
            maxSpeed: 60,
            acceleration: 0.15,      
            spawnInterval: 1.6,     
            despawnZ: 10,           
            spawnZ: -140,           
            types: {
                TRAIN: 'train',
                BARRIER_LOW: 'barrier_low',   
                BARRIER_HIGH: 'barrier_high'  
            }
        };

        // --- 2. ASSET MANAGER (PLACEHOLDERS) ---
        class AssetManager {
            constructor() {
                this.materials = {};
                this.geometries = {};
                this.createPlaceholders();
            }
            createPlaceholders() {
                this.geometries['player'] = new THREE.BoxGeometry(1, 1.8, 1);
                this.materials['player'] = new THREE.MeshStandardMaterial({ color: 0x33ccff, roughness: 0.3 });

                this.geometries['coin'] = new THREE.CylinderGeometry(0.5, 0.5, 0.15, 16);
                this.materials['coin'] = new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.8, roughness: 0.2 });

                this.geometries['train'] = new THREE.BoxGeometry(2.6, 3.8, 14);
                this.materials['train'] = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.4 });

                this.geometries['barrier_low'] = new THREE.BoxGeometry(3, 1, 0.6);
                this.materials['barrier_low'] = new THREE.MeshStandardMaterial({ color: 0xff8800, roughness: 0.5 });

                this.geometries['barrier_high'] = new THREE.BoxGeometry(3, 0.8, 0.6);
                this.materials['barrier_high'] = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.6 });

                this.geometries['ground'] = new THREE.PlaneGeometry(14, 200);
                this.materials['ground'] = new THREE.MeshStandardMaterial({ color: 0x252525, roughness: 0.8 });

                this.geometries['building'] = new THREE.BoxGeometry(10, 40, 20);
                this.materials['building'] = new THREE.MeshStandardMaterial({ color: 0x3a3a4a, roughness: 0.9 });
            }
            getGeometry(key) { return this.geometries[key]; }
            getMaterial(key) { return this.materials[key]; }
        }
        const assets = new AssetManager();

        // --- 3. INPUT HANDLER ---
        class InputHandler {
            constructor() {
                this.listeners = {};
                this.touchStartX = 0;
                this.touchStartY = 0;
                this.minSwipeDistance = 30;
                this.initKeyboard();
                this.initTouch();
                this.initButtons();
            }
            on(action, callback) { this.listeners[action] = callback; }
            trigger(action) { if (this.listeners[action]) this.listeners[action](); }
            initKeyboard() {
                window.addEventListener('keydown', (e) => {
                    switch(e.key) {
                        case 'ArrowLeft': case 'a': case 'A': this.trigger('LEFT'); break;
                        case 'ArrowRight': case 'd': case 'D': this.trigger('RIGHT'); break;
                        case 'ArrowUp': case 'w': case 'W': case ' ': this.trigger('JUMP'); break;
                        case 'ArrowDown': case 's': case 'S': this.trigger('SLIDE'); break;
                    }
                });
            }
            initTouch() {
                window.addEventListener('touchstart', (e) => {
                    this.touchStartX = e.touches[0].clientX;
                    this.touchStartY = e.touches[0].clientY;
                }, { passive: true });
                window.addEventListener('touchend', (e) => {
                    if (!this.touchStartX || !this.touchStartY) return;
                    let diffX = e.changedTouches[0].clientX - this.touchStartX;
                    let diffY = e.changedTouches[0].clientY - this.touchStartY;
                    if (Math.abs(diffX) > Math.abs(diffY)) {
                        if (Math.abs(diffX) > this.minSwipeDistance) {
                            if (diffX > 0) this.trigger('RIGHT'); else this.trigger('LEFT');
                        }
                    } else {
                        if (Math.abs(diffY) > this.minSwipeDistance) {
                            if (diffY > 0) this.trigger('SLIDE'); else this.trigger('JUMP');
                        }
                    }
                    this.touchStartX = 0; this.touchStartY = 0;
                }, { passive: true });
            }
            initButtons() {
                document.getElementById('btn-left')?.addEventListener('click', () => this.trigger('LEFT'));
                document.getElementById('btn-right')?.addEventListener('click', () => this.trigger('RIGHT'));
                document.getElementById('btn-up')?.addEventListener('click', () => this.trigger('JUMP'));
                document.getElementById('btn-down')?.addEventListener('click', () => this.trigger('SLIDE'));
            }
        }

        // --- 4. ENTIDADES ---
        class Player {
            constructor(scene) {
                this.scene = scene;
                this.currentLaneIndex = 1; 
                this.targetX = GAME_CONFIG.lanes[this.currentLaneIndex];
                this.velocityPercentY = 0;
                this.isJumping = false;
                this.isSliding = false;
                this.slideTimer = 0;
                this.createMesh();
            }
            createMesh() {
                // Creamos un contenedor (Group) para el personaje de choclo
                this.mesh = new THREE.Group();

                // Materiales del choclo
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.5 }); // Amarillo maíz
                const huskMat = new THREE.MeshStandardMaterial({ color: 0x55aa22, roughness: 0.6 }); // Verde hojas
                const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
                const eyeBlackMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 });
                const blushMat = new THREE.MeshStandardMaterial({ color: 0xff6699, roughness: 0.4 }); // Mejillas rosadas
                const mouthMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });

                // Geometrías
                const bodyGeom = new THREE.CylinderGeometry(0.35, 0.45, 1.3, 16);
                const stemGeom = new THREE.CylinderGeometry(0.08, 0.08, 0.3, 8);
                const huskGeom = new THREE.ConeGeometry(0.4, 1.1, 8);
                const eyeWhiteGeom = new THREE.SphereGeometry(0.12, 8, 8);
                const eyeBlackGeom = new THREE.SphereGeometry(0.06, 8, 8);
                const blushGeom = new THREE.SphereGeometry(0.06, 8, 8);
                const mouthGeom = new THREE.BoxGeometry(0.12, 0.04, 0.04);

                // 1. Cuerpo principal (El choclo)
                const body = new THREE.Mesh(bodyGeom, bodyMat);
                body.position.y = 0;
                body.castShadow = true;
                body.receiveShadow = true;
                this.mesh.add(body);

                // 2. Tallo inferior
                const stem = new THREE.Mesh(stemGeom, huskMat);
                stem.position.y = -0.75;
                stem.castShadow = true;
                this.mesh.add(stem);

                // 3. Hojas envolventes (Husks)
                const huskLeft = new THREE.Mesh(huskGeom, huskMat);
                huskLeft.position.set(-0.25, -0.15, 0);
                huskLeft.rotation.z = 0.25;
                huskLeft.castShadow = true;
                this.mesh.add(huskLeft);

                const huskRight = new THREE.Mesh(huskGeom, huskMat);
                huskRight.position.set(0.25, -0.15, 0);
                huskRight.rotation.z = -0.25;
                huskRight.castShadow = true;
                this.mesh.add(huskRight);

                const huskBack = new THREE.Mesh(huskGeom, huskMat);
                huskBack.position.set(0, -0.15, -0.25);
                huskBack.rotation.x = -0.25;
                huskBack.castShadow = true;
                this.mesh.add(huskBack);

                // 4. Ojos (Mirando hacia la cámara, dirección Z positiva)
                const eyeLeftW = new THREE.Mesh(eyeWhiteGeom, eyeWhiteMat);
                eyeLeftW.position.set(-0.15, 0.25, 0.38);
                this.mesh.add(eyeLeftW);

                const eyeLeftB = new THREE.Mesh(eyeBlackGeom, eyeBlackMat);
                eyeLeftB.position.set(-0.15, 0.25, 0.44);
                this.mesh.add(eyeLeftB);

                const eyeRightW = new THREE.Mesh(eyeWhiteGeom, eyeWhiteMat);
                eyeRightW.position.set(0.15, 0.25, 0.38);
                this.mesh.add(eyeRightW);

                const eyeRightB = new THREE.Mesh(eyeBlackGeom, eyeBlackMat);
                eyeRightB.position.set(0.15, 0.25, 0.44);
                this.mesh.add(eyeRightB);

                // 5. Mejillas rosadas
                const blushL = new THREE.Mesh(blushGeom, blushMat);
                blushL.position.set(-0.24, 0.1, 0.38);
                this.mesh.add(blushL);

                const blushR = new THREE.Mesh(blushGeom, blushMat);
                blushR.position.set(0.24, 0.1, 0.38);
                this.mesh.add(blushR);

                // 6. Boca (Sonrisa)
                const mouth = new THREE.Mesh(mouthGeom, mouthMat);
                mouth.position.set(0, 0.12, 0.41);
                this.mesh.add(mouth);

                // Posicionamiento inicial
                this.mesh.position.set(this.targetX, GAME_CONFIG.playerStartY, 0);
                this.scene.add(this.mesh);
                this.boundingBox = new THREE.Box3(new THREE.Vector3(), new THREE.Vector3());
            }
            moveLeft() {
                if (this.currentLaneIndex > 0) {
                    this.currentLaneIndex--;
                    this.targetX = GAME_CONFIG.lanes[this.currentLaneIndex];
                }
            }
            moveRight() {
                if (this.currentLaneIndex < GAME_CONFIG.lanes.length - 1) {
                    this.currentLaneIndex++;
                    this.targetX = GAME_CONFIG.lanes[this.currentLaneIndex];
                }
            }
            jump() {
                if (!this.isJumping) {
                    this.velocityPercentY = GAME_CONFIG.jumpForce;
                    this.isJumping = true;
                    if (this.isSliding) this.cancelSlide();
                }
            }
            slide() {
                if (this.isJumping) {
                    this.velocityPercentY = -GAME_CONFIG.jumpForce;
                } else if (!this.isSliding) {
                    this.isSliding = true;
                    this.slideTimer = GAME_CONFIG.slideDuration;
                    this.mesh.scale.set(1, 0.5, 1);
                    this.mesh.position.y = GAME_CONFIG.playerStartY / 2;
                }
            }
            cancelSlide() {
                this.isSliding = false;
                this.mesh.scale.set(1, 1, 1);
                this.mesh.position.y = GAME_CONFIG.playerStartY;
            }
            update(deltaTime) {
                this.mesh.position.x = THREE.MathUtils.lerp(this.mesh.position.x, this.targetX, GAME_CONFIG.laneSwitchSpeed * deltaTime);
                if (this.isJumping || this.mesh.position.y > GAME_CONFIG.playerStartY) {
                    this.velocityPercentY += GAME_CONFIG.gravity * deltaTime;
                    this.mesh.position.y += this.velocityPercentY * deltaTime;
                    let currentFloor = this.isSliding ? GAME_CONFIG.playerStartY / 2 : GAME_CONFIG.playerStartY;
                    if (this.mesh.position.y <= currentFloor) {
                        this.mesh.position.y = currentFloor;
                        this.velocityPercentY = 0;
                        this.isJumping = false;
                    }
                }
                if (this.isSliding) {
                    this.slideTimer -= deltaTime;
                    if (this.slideTimer <= 0) this.cancelSlide();
                }
                this.boundingBox.setFromObject(this.mesh);
            }
            reset() {
                this.currentLaneIndex = 1;
                this.targetX = GAME_CONFIG.lanes[this.currentLaneIndex];
                this.mesh.position.set(this.targetX, GAME_CONFIG.playerStartY, 0);
                this.cancelSlide();
                this.isJumping = false;
                this.velocityPercentY = 0;
            }
        }

        class Obstacle {
            constructor(scene) {
                this.scene = scene;
                this.mesh = new THREE.Group();
                this.type = null;
                this.boundingBox = new THREE.Box3();
                this.active = false;
                this.scene.add(this.mesh);
            }
            spawn(type, laneIndex, zPos) {
                this.type = type;
                this.active = true;
                this.mesh.clear();
                let baseMesh;
                let yPos = 0;

                switch(type) {
                    case GAME_CONFIG.types.TRAIN:
                        baseMesh = new THREE.Mesh(assets.getGeometry('train'), assets.getMaterial('train'));
                        yPos = 1.9;
                        break;
                    case GAME_CONFIG.types.BARRIER_LOW:
                        baseMesh = new THREE.Mesh(assets.getGeometry('barrier_low'), assets.getMaterial('barrier_low'));
                        yPos = 0.5;
                        break;
                    case GAME_CONFIG.types.BARRIER_HIGH:
                        baseMesh = new THREE.Mesh(assets.getGeometry('barrier_high'), assets.getMaterial('barrier_high'));
                        yPos = 1.9; 
                        break;
                }
                if (baseMesh) {
                    baseMesh.castShadow = true;
                    baseMesh.receiveShadow = true;
                    this.mesh.add(baseMesh);
                }
                this.mesh.position.set(GAME_CONFIG.lanes[laneIndex], yPos, zPos);
                this.mesh.visible = true;
            }
            update(speed, deltaTime) {
                if (!this.active) return;
                this.mesh.position.z += speed * deltaTime;
                if (this.mesh.position.z > GAME_CONFIG.despawnZ) {
                    this.despawn();
                } else {
                    this.boundingBox.setFromObject(this.mesh);
                }
            }
            despawn() {
                this.active = false;
                this.mesh.visible = false;
            }
        }

        class Coin {
            constructor(scene) {
                this.scene = scene;
                this.boundingBox = new THREE.Box3();
                this.active = false;
                this.productType = 0; // 0=arroz, 1=camote, 2=platano
                
                // Crear grupo para el producto
                this.meshGroup = new THREE.Group();
                this.scene.add(this.meshGroup);
                
                // Pre-crear los tres tipos de productos
                this.productMeshes = [
                    this.createArroz(),      // 0 - Arroz
                    this.createCamote(),     // 1 - Camote
                    this.createPlatano()     // 2 - Plátano
                ];
                
                // Agregar todos al grupo pero invisibles
                this.productMeshes.forEach(mesh => {
                    mesh.visible = false;
                    this.meshGroup.add(mesh);
                });
            }
            
            createArroz() {
                // Arroz: Bowl rojo con arroz blanco MEJORADO (basado en la imagen)
                const group = new THREE.Group();
                
                // Bowl rojo - MÁS GRANDE y PROMINENTE
                const bowlGeometry = new THREE.SphereGeometry(1.0, 40, 40);
                const bowlMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xE63946,  // Rojo vibrante
                    roughness: 0.2,
                    metalness: 0.3
                });
                const bowl = new THREE.Mesh(bowlGeometry, bowlMaterial);
                bowl.scale.set(1.2, 0.7, 1.2);  // Achatarlo para que sea un bowl realista
                group.add(bowl);
                
                // Borde del bowl (para más definición)
                const rimGeometry = new THREE.TorusGeometry(1.2, 0.15, 16, 100);
                const rimMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xC1121F,  // Rojo más oscuro
                    roughness: 0.3
                });
                const rim = new THREE.Mesh(rimGeometry, rimMaterial);
                rim.rotation.x = Math.PI * 0.5;
                rim.position.y = 0.35;
                group.add(rim);
                
                // Sombra interior del bowl
                const innerShadowGeometry = new THREE.SphereGeometry(0.95, 40, 40);
                const innerShadowMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xA01020,  // Rojo muy oscuro
                    roughness: 0.5
                });
                const innerShadow = new THREE.Mesh(innerShadowGeometry, innerShadowMaterial);
                innerShadow.scale.set(1.1, 0.6, 1.1);
                innerShadow.position.y = -0.1;
                group.add(innerShadow);
                
                // Arroz blanco - MUCHO MÁS VOLUMEN Y DETALLE
                const riceMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xFFFFFF,  // Blanco puro
                    roughness: 0.9
                });
                
                // Crear una base de arroz más densa
                for (let i = 0; i < 35; i++) {
                    const grain = new THREE.Mesh(
                        new THREE.BoxGeometry(0.12, 0.25, 0.08),
                        riceMaterial
                    );
                    grain.position.set(
                        (Math.random() - 0.5) * 1.0,
                        (Math.random() * 0.4) + 0.1,
                        (Math.random() - 0.5) * 0.9
                    );
                    grain.rotation.x = Math.random() * Math.PI;
                    grain.rotation.y = Math.random() * Math.PI;
                    grain.rotation.z = Math.random() * Math.PI;
                    grain.scale.set(0.7 + Math.random() * 0.6, 1.2 + Math.random() * 0.8, 0.7 + Math.random() * 0.5);
                    group.add(grain);
                }
                
                // Palillos - MÁS GRANDES Y VISIBLES
                const stickMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xD2A679,  // Color de madera claro
                    roughness: 0.5,
                    metalness: 0.1
                });
                
                for (let i = 0; i < 2; i++) {
                    const stick = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.12, 0.12, 1.4, 12),
                        stickMaterial
                    );
                    stick.position.set(
                        (i === 0 ? -0.35 : 0.35),
                        0.5,
                        0.1
                    );
                    stick.rotation.z = 0.35;
                    group.add(stick);
                }
                
                // Puntas de los palillos (más oscuras)
                const tipMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x9A8C6F,  // Madera más oscura
                    roughness: 0.6
                });
                
                for (let i = 0; i < 2; i++) {
                    const tip = new THREE.Mesh(
                        new THREE.ConeGeometry(0.08, 0.25, 8),
                        tipMaterial
                    );
                    tip.position.set(
                        (i === 0 ? -0.55 : 0.55),
                        1.35,
                        0.2
                    );
                    tip.rotation.z = 0.35;
                    group.add(tip);
                }
                
                return group;
            }
            
            createCamote() {
                // Camote: forma realista basada en la imagen
                const group = new THREE.Group();
                
                // Cuerpo principal del camote - más redondeado y realista
                const bodyGeometry = new THREE.SphereGeometry(0.7, 32, 32);
                const bodyMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xC97137,  // Naranja oscuro más realista
                    roughness: 0.7,
                    metalness: 0
                });
                const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                body.scale.set(0.75, 1.0, 0.75);  // Forma ovalada pero más natural
                group.add(body);
                
                // Detalles de textura con pequeños bultos
                const detailMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xB8621B,  // Naranja más oscuro para sombras
                    roughness: 0.8
                });
                
                for (let i = 0; i < 5; i++) {
                    const detail = new THREE.Mesh(
                        new THREE.SphereGeometry(0.12, 12, 12),
                        detailMaterial
                    );
                    detail.position.set(
                        (Math.random() - 0.5) * 0.8,
                        (Math.random() - 0.5) * 0.8,
                        (Math.random() - 0.5) * 0.8
                    );
                    detail.scale.set(0.6, 0.6, 0.6);
                    group.add(detail);
                }
                
                // Pequeña zona más clara (como brillo en la imagen)
                const shineMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xE8904B,  // Naranja más claro
                    roughness: 0.4,
                    metalness: 0.1
                });
                const shine = new THREE.Mesh(
                    new THREE.SphereGeometry(0.25, 16, 16),
                    shineMaterial
                );
                shine.position.set(0.3, 0.3, 0.3);
                group.add(shine);
                
                return group;
            }
            
            createPlatano() {
                // Plátano: forma realista basada en la imagen
                const group = new THREE.Group();
                
                // Material principal - amarillo brillante como en la imagen
                const yellowMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xFFD60A,  // Amarillo brillante
                    roughness: 0.4,
                    metalness: 0.15
                });
                
                // Material para las sombras/toques oscuros
                const darkMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xD4A60D,  // Amarillo más oscuro
                    roughness: 0.5
                });
                
                // Crear un racimo de plátanos (3 plátanos)
                for (let i = 0; i < 3; i++) {
                    const banana = new THREE.Group();
                    
                    // Cuerpo del plátano
                    const bodyGeometry = new THREE.CapsuleGeometry(0.22, 1.0, 8, 16);
                    const body = new THREE.Mesh(bodyGeometry, yellowMaterial);
                    body.rotation.z = 0.4 + (i * 0.15);  // Ángulo ligeramente diferente para cada plátano
                    banana.add(body);
                    
                    // Punta marrón oscura superior
                    const topTip = new THREE.Mesh(
                        new THREE.SphereGeometry(0.2, 16, 16),
                        new THREE.MeshStandardMaterial({ 
                            color: 0x5C3D1F,  // Marrón oscuro
                            roughness: 0.6
                        })
                    );
                    topTip.position.set(0.35, 0.6, 0);
                    topTip.scale.set(0.7, 0.8, 0.7);
                    banana.add(topTip);
                    
                    // Punta marrón oscura inferior
                    const botTip = new THREE.Mesh(
                        new THREE.SphereGeometry(0.18, 16, 16),
                        new THREE.MeshStandardMaterial({ 
                            color: 0x6B4C2E,  // Marrón más claro
                            roughness: 0.6
                        })
                    );
                    botTip.position.set(-0.25, -0.6, 0);
                    botTip.scale.set(0.65, 0.7, 0.65);
                    banana.add(botTip);
                    
                    // Línea oscura vertical para más realismo
                    const lineGeometry = new THREE.CylinderGeometry(0.03, 0.03, 0.9, 4);
                    const line = new THREE.Mesh(lineGeometry, darkMaterial);
                    line.position.set(0.18, 0, -0.22);
                    line.rotation.z = 0.4;
                    banana.add(line);
                    
                    // Brillo/luz en el plátano
                    const shineGeometry = new THREE.SphereGeometry(0.15, 12, 12);
                    const shineMaterial = new THREE.MeshStandardMaterial({ 
                        color: 0xFFFACD,  // Amarillo muy claro
                        roughness: 0.3,
                        metalness: 0.2
                    });
                    const shine = new THREE.Mesh(shineGeometry, shineMaterial);
                    shine.position.set(0.1 + (i * 0.05), 0.2, 0.25);
                    shine.scale.set(0.5, 0.4, 0.4);
                    banana.add(shine);
                    
                    // Posicionar cada plátano en el racimo
                    banana.position.set(i * 0.25 - 0.25, i * 0.15 - 0.15, 0);
                    group.add(banana);
                }
                
                // Corona/hojas en la parte superior
                const crownMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x8B6F47,  // Marrón tierra
                    roughness: 0.7
                });
                
                for (let i = 0; i < 3; i++) {
                    const leaf = new THREE.Mesh(
                        new THREE.ConeGeometry(0.15, 0.4, 6),
                        crownMaterial
                    );
                    leaf.position.set((i - 1) * 0.15, 0.85, (i - 1) * 0.1);
                    leaf.rotation.x = Math.PI * 0.5 + (i * 0.3);
                    leaf.rotation.z = (i * 0.5) - 0.75;
                    group.add(leaf);
                }
                
                return group;
            }
            
            spawn(laneIndex, yPos, zPos) {
                this.active = true;
                
                // Cambiar producto aleatoriamente
                this.productType = Math.floor(Math.random() * 3);
                
                // Ocultar todos y mostrar el actual
                this.productMeshes.forEach((mesh, index) => {
                    mesh.visible = (index === this.productType);
                });
                
                this.meshGroup.position.set(GAME_CONFIG.lanes[laneIndex], yPos, zPos);
                this.meshGroup.visible = true;
            }
            
            update(speed, deltaTime) {
                if (!this.active) return;
                this.meshGroup.position.z += speed * deltaTime;
                this.meshGroup.rotation.z += 3 * deltaTime;
                this.meshGroup.rotation.y += 2 * deltaTime;
                
                if (this.meshGroup.position.z > GAME_CONFIG.despawnZ) {
                    this.despawn();
                } else {
                    this.boundingBox.setFromObject(this.meshGroup);
                }
            }
            
            despawn() {
                this.active = false;
                this.meshGroup.visible = false;
            }
        }

        // --- 5. MANAGERS ---
        class WorldManager {
            constructor(scene) {
                this.scene = scene;
                this.floors = [];
                this.buildings = [];
                this.segmentLength = 200;
                this.createEnvironment();
            }
            createEnvironment() {
                for(let i = 0; i < 2; i++) {
                    let floor = new THREE.Mesh(assets.getGeometry('ground'), assets.getMaterial('ground'));
                    floor.rotation.x = -Math.PI / 2;
                    floor.position.z = -i * this.segmentLength;
                    floor.receiveShadow = true;
                    this.scene.add(floor);
                    this.floors.push(floor);
                }
                for (let i = 0; i < 15; i++) {
                    this.spawnBuildingRow(-i * 20);
                }
            }
            spawnBuildingRow(zPos) {
                let sideMat = assets.getMaterial('building');
                let geom = assets.getGeometry('building');
                let bLeft = new THREE.Mesh(geom, sideMat);
                bLeft.position.set(-11, 20, zPos);
                this.scene.add(bLeft);
                this.buildings.push(bLeft);

                let bRight = new THREE.Mesh(geom, sideMat);
                bRight.position.set(11, 20, zPos);
                this.scene.add(bRight);
                this.buildings.push(bRight);
            }
            update(speed, deltaTime) {
                this.floors.forEach(floor => {
                    floor.position.z += speed * deltaTime;
                    if (floor.position.z >= this.segmentLength) {
                        floor.position.z -= this.segmentLength * 2;
                    }
                });
                this.buildings.forEach(b => {
                    b.position.z += speed * deltaTime;
                    if (b.position.z > 20) b.position.z -= 300;
                });
            }
        }

        class ObstaclePool {
            constructor(scene) {
                this.scene = scene;
                this.obstacles = [];
                this.coins = [];
                this.poolSize = 20;
                this.initPools();
            }
            initPools() {
                for (let i = 0; i < this.poolSize; i++) {
                    this.obstacles.push(new Obstacle(this.scene));
                    this.coins.push(new Coin(this.scene));
                }
            }
            getAvailableObstacle() {
                return this.obstacles.find(o => !o.active) || this.createNewObstacle();
            }
            getAvailableCoin() {
                return this.coins.find(c => !c.active) || this.createNewCoin();
            }
            createNewObstacle() {
                let o = new Obstacle(this.scene); this.obstacles.push(o); return o;
            }
            createNewCoin() {
                let c = new Coin(this.scene); this.coins.push(c); return c;
            }
            spawnPattern() {
                let patternType = Math.floor(Math.random() * 3);
                let targetZ = GAME_CONFIG.spawnZ;

                if (patternType === 0) {
                    let trainLane = Math.floor(Math.random() * 3);
                    this.getAvailableObstacle().spawn(GAME_CONFIG.types.TRAIN, trainLane, targetZ);
                    let coinLane = (trainLane + 1) % 3;
                    this.spawnCoinRow(coinLane, targetZ);
                } else if (patternType === 1) {
                    this.getAvailableObstacle().spawn(GAME_CONFIG.types.BARRIER_LOW, 0, targetZ);
                    this.getAvailableObstacle().spawn(GAME_CONFIG.types.BARRIER_HIGH, 1, targetZ - 20);
                    this.getAvailableObstacle().spawn(GAME_CONFIG.types.BARRIER_LOW, 2, targetZ - 40);
                } else {
                    let lane = Math.floor(Math.random() * 3);
                    this.getAvailableObstacle().spawn(GAME_CONFIG.types.BARRIER_LOW, lane, targetZ);
                    this.spawnCoinArc(lane, targetZ - 5);
                }
            }
            spawnCoinRow(lane, startZ) {
                for (let i = 0; i < 5; i++) {
                    this.getAvailableCoin().spawn(lane, 0.6, startZ - (i * 4));
                }
            }
            spawnCoinArc(lane, startZ) {
                const heights = [0.6, 1.6, 2.6, 1.6, 0.6];
                for (let i = 0; i < heights.length; i++) {
                    this.getAvailableCoin().spawn(lane, heights[i], startZ - (i * 3));
                }
            }
            update(speed, deltaTime, player, onCollisionObstacle, onCollisionCoin) {
                this.obstacles.forEach(obs => {
                    if (obs.active) {
                        obs.update(speed, deltaTime);
                        if (player.boundingBox.intersectsBox(obs.boundingBox)) onCollisionObstacle();
                    }
                });
                this.coins.forEach(coin => {
                    if (coin.active) {
                        coin.update(speed, deltaTime);
                        if (player.boundingBox.intersectsBox(coin.boundingBox)) {
                            coin.despawn();
                            onCollisionCoin();
                        }
                    }
                });
            }
            clearAll() {
                this.obstacles.forEach(o => o.despawn());
                this.coins.forEach(c => c.despawn());
            }
        }

        class ScoreManager {
            constructor() {
                this.score = 0;
                this.coins = 0;
                this.multiplier = 1;
                this.energy = 0;
                this.maxEnergy = 100;
                this.highScore = parseInt(localStorage.getItem('subway_high_score')) || 0;
            }
            addCoin() { 
                this.coins++;
                // Aumentar energía en 1 por cada alimento recolectado
                this.addEnergy(1);
            }
            addEnergy(amount) {
                this.energy = Math.min(this.energy + amount, this.maxEnergy);
            }
            updateScore(distanceDelta, currentSpeed) {
                this.score += distanceDelta * this.multiplier * (currentSpeed * 0.08);
            }
            getFormattedScore() { return Math.floor(this.score).toString().padStart(6, '0'); }
            checkAndSaveHighScore() {
                if (this.score > this.highScore) {
                    this.highScore = Math.floor(this.score);
                    localStorage.setItem('subway_high_score', this.highScore);
                }
            }
            reset() { this.score = 0; this.coins = 0; this.multiplier = 1; this.energy = 0; }
        }

        // --- 6. INTERFAZ DE USUARIO (UI) ---
        class UIManager {
            constructor(game) {
                this.game = game;
                this.startMenu = document.getElementById('start-menu');
                this.hud = document.getElementById('hud');
                this.gameOverMenu = document.getElementById('game-over-menu');
                this.scoreDisplay = document.getElementById('score-display');
                this.coinDisplay = document.getElementById('coin-display');
                this.multiplierDisplay = document.getElementById('multiplier-display');
                this.finalScore = document.getElementById('final-score');
                this.finalCoins = document.getElementById('final-coins');
                this.highScoreDisplay = document.getElementById('high-score-display');
                this.restartBtn = document.getElementById('restart-btn');
                this.energyBar = document.getElementById('energy-bar');
                this.energyText = document.getElementById('energy-text');
                this.initEvents();
            }
            initEvents() {
                this.startMenu.addEventListener('click', () => this.game.start());
                this.restartBtn.addEventListener('click', () => this.game.restart());
            }
            showHUD() {
                this.startMenu.classList.add('hidden');
                this.gameOverMenu.classList.add('hidden');
                this.hud.classList.remove('hidden');
            }
            showGameOver(score, coins, highScore) {
                this.hud.classList.add('hidden');
                this.gameOverMenu.classList.remove('hidden');
                this.finalScore.innerText = Math.floor(score);
                this.finalCoins.innerText = coins;
                this.highScoreDisplay.innerText = highScore;
            }
            showMissionComplete(score, coins, highScore) {
                this.hud.classList.add('hidden');
                this.gameOverMenu.classList.remove('hidden');
                
                // Cambiar el título a misión completada con mensaje personalizado
                const gameOverTitle = this.gameOverMenu.querySelector('.game-over-title');
                gameOverTitle.innerText = '¡Llegaste a la meta y comiste tus carbohidratos, puedes salir al recreo! 🎉';
                gameOverTitle.style.color = '#00ff00';
                gameOverTitle.style.fontSize = '1.8rem';
                
                this.finalScore.innerText = Math.floor(score);
                this.finalCoins.innerText = coins;
                this.highScoreDisplay.innerText = highScore;
            }
            updateHUD(scoreStr, coins, multiplier, energy) {
                this.scoreDisplay.innerText = scoreStr;
                this.coinDisplay.innerText = coins;
                this.multiplierDisplay.innerText = `x${multiplier}`;
                
                // Actualizar barra de energía
                const energyPercent = Math.min((energy / 100) * 100, 100);
                this.energyBar.style.width = energyPercent + '%';
                this.energyText.innerText = Math.floor(energy) + '/100';
            }
        }

        // --- 7. CORE DEL JUEGO ---
        class Game {
            constructor() {
                this.state = 'MENU'; 
                this.currentSpeed = GAME_CONFIG.initialSpeed;
                this.spawnTimer = 0;
                this.initEngine();
                this.initSubsystems();
                this.animate();
            }
            initEngine() {
                this.container = document.getElementById('game-container');
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0xaaccff);
                this.scene.fog = new THREE.FogExp2(0xaaccff, 0.012);

                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
                this.camera.position.set(0, 5, 6);
                this.camera.lookAt(0, 1.4, -5);

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.container.appendChild(this.renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
                this.scene.add(ambientLight);

                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(5, 25, 15);
                dirLight.castShadow = true;
                this.scene.add(dirLight);

                window.addEventListener('resize', () => this.onWindowResize(), false);
            }
            initSubsystems() {
                this.input = new InputHandler();
                this.player = new Player(this.scene);
                this.world = new WorldManager(this.scene);
                this.pool = new ObstaclePool(this.scene);
                this.scoreManager = new ScoreManager();
                this.ui = new UIManager(this);

                this.input.on('LEFT', () => { if(this.state === 'PLAYING') this.player.moveLeft(); });
                this.input.on('RIGHT', () => { if(this.state === 'PLAYING') this.player.moveRight(); });
                this.input.on('JUMP', () => { 
                    if(this.state === 'PLAYING') this.player.jump();
                    else if(this.state === 'MENU') this.start();
                });
                this.input.on('SLIDE', () => { if(this.state === 'PLAYING') this.player.slide(); });

                this.clock = new THREE.Clock();
            }
            start() {
                this.state = 'PLAYING';
                this.currentSpeed = GAME_CONFIG.initialSpeed;
                this.spawnTimer = 0;
                this.scoreManager.reset();
                this.player.reset();
                this.pool.clearAll();
                this.ui.showHUD();
            }
            gameOver() {
                this.state = 'GAMEOVER';
                this.scoreManager.checkAndSaveHighScore();
                this.ui.showGameOver(this.scoreManager.score, this.scoreManager.coins, this.scoreManager.highScore);
            }
            onFoodCollected() {
                this.scoreManager.addCoin();
                
                // Aumentar velocidad en 0.10%
                this.currentSpeed *= 1.001;
                
                // Verificar si se alcanzó la meta de 100 de energía
                if (this.scoreManager.energy >= 100) {
                    this.missionComplete();
                }
            }
            missionComplete() {
                this.state = 'GAMEOVER';
                this.scoreManager.checkAndSaveHighScore();
                this.ui.showMissionComplete(this.scoreManager.score, this.scoreManager.coins, this.scoreManager.highScore);
            }
            restart() { this.start(); }
            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }
            animate() {
                requestAnimationFrame(() => this.animate());
                let deltaTime = this.clock.getDelta();
                if (deltaTime > 0.1) deltaTime = 0.1;

                if (this.state === 'PLAYING') {
                    if (this.currentSpeed < GAME_CONFIG.maxSpeed) {
                        this.currentSpeed += GAME_CONFIG.acceleration * deltaTime;
                    }
                    this.player.update(deltaTime);
                    this.world.update(this.currentSpeed, deltaTime);

                    this.spawnTimer += deltaTime;
                    if (this.spawnTimer >= GAME_CONFIG.spawnInterval) {
                        this.pool.spawnPattern();
                        this.spawnTimer = 0;
                    }

                    this.pool.update(
                        this.currentSpeed, deltaTime, this.player,
                        () => this.gameOver(),
                        () => this.onFoodCollected()
                    );
                    this.scoreManager.updateScore(this.currentSpeed * deltaTime, this.currentSpeed);
                    this.ui.updateHUD(this.scoreManager.getFormattedScore(), this.scoreManager.coins, this.scoreManager.multiplier, this.scoreManager.energy);
                }
                this.renderer.render(this.scene, this.camera);
            }
        }

        window.addEventListener('DOMContentLoaded', () => { new Game(); });
    </script>
